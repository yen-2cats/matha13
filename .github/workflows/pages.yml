name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # 部署前先跑完整測試：紅燈不上線（原本測試與部署平行，壞版照樣發佈）
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test before deploy
        run: npm test
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
