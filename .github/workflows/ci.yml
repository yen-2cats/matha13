name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check supabase/functions/openai-proxy/index.ts supabase/functions/openai-proxy/lib.ts supabase/functions/openai-proxy/lib.test.ts supabase/functions/device-pair/index.ts
      - run: deno check --node-modules-dir=auto supabase/functions/openai-proxy/index.ts supabase/functions/openai-proxy/lib.test.ts supabase/functions/device-pair/index.ts
      - run: deno test supabase/functions/openai-proxy/lib.test.ts
