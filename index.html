<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 移除 maximum-scale/user-scalable：讓 Android 能雙指放大密集數學/小灰字；畫線區各自 touch-action:none 防寫字時縮放衝突 -->

  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0f766e">
  <title>數A特訓</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png?v=4">
  <link rel="apple-touch-icon" href="icon-192.png?v=4">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><nav></nav></header>
  <main id="app"></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="bank.js"></script>
  <script src="app.js"></script>
  <script>
    // PWA：正式站註冊 service worker（artifact/file 環境會靜默跳過）
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
